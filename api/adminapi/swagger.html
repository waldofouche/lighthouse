<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Federation Admin API</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #swagger-ui { height: 100%; }
    .custom-server-controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }
    .custom-server-controls input {
      flex: 1;
      padding: 5px 10px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 14px;
      font-family: sans-serif;
    }
    .custom-server-controls button {
      padding: 5px 15px;
      background: #4990e2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-family: sans-serif;
    }
    .custom-server-controls button:hover {
      background: #357abd;
    }
    .custom-server-controls button.remove {
      background: #d9534f;
      padding: 5px 10px;
    }
    .custom-server-controls button.remove:hover {
      background: #c9302c;
    }
    .custom-servers-list {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
    .custom-servers-list .custom-server-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
  </style>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    // Storage keys for custom servers and selected server
    const CUSTOM_SERVERS_KEY = 'swagger-custom-servers-admin';
    const SELECTED_SERVER_KEY = 'swagger-selected-server-admin';

    function getCustomServers() {
      try {
        return JSON.parse(localStorage.getItem(CUSTOM_SERVERS_KEY)) || [];
      } catch (e) { return []; }
    }

    function saveCustomServer(url) {
      const servers = getCustomServers();
      if (!servers.includes(url)) {
        servers.push(url);
        localStorage.setItem(CUSTOM_SERVERS_KEY, JSON.stringify(servers));
      }
      // Also set this as the selected server
      localStorage.setItem(SELECTED_SERVER_KEY, url);
    }

    function removeCustomServer(url) {
      const servers = getCustomServers().filter(s => s !== url);
      localStorage.setItem(CUSTOM_SERVERS_KEY, JSON.stringify(servers));
      // Clear selected server if it was the removed one
      if (localStorage.getItem(SELECTED_SERVER_KEY) === url) {
        localStorage.removeItem(SELECTED_SERVER_KEY);
      }
    }

    function getSelectedServer() {
      return localStorage.getItem(SELECTED_SERVER_KEY);
    }

    function clearSelectedServer() {
      localStorage.removeItem(SELECTED_SERVER_KEY);
    }

    // Plugin to wrap the Servers component with editable functionality
    const EditableServersPlugin = (customServers) => () => ({
      wrapComponents: {
        ServersContainer: (Original, system) => (props) => {
          const React = system.React;
          const [customUrl, setCustomUrl] = React.useState('');

          const handleAddServer = () => {
            const url = customUrl.trim();
            if (!url) return;
            try {
              new URL(url); // Validate URL
              saveCustomServer(url);
              window.location.reload();
            } catch (e) {
              alert('Please enter a valid URL');
            }
          };

          const handleRemoveServer = (url) => {
            removeCustomServer(url);
            window.location.reload();
          };

          return React.createElement('div', null,
            React.createElement(Original, props),
            React.createElement('div', { className: 'custom-server-controls' },
              React.createElement('input', {
                type: 'text',
                placeholder: 'Add custom server URL (e.g., https://example.com/admin)',
                value: customUrl,
                onChange: (e) => setCustomUrl(e.target.value),
                onKeyPress: (e) => e.key === 'Enter' && handleAddServer()
              }),
              React.createElement('button', { onClick: handleAddServer }, 'Add Server')
            ),
            customServers.length > 0 && React.createElement('div', { className: 'custom-servers-list' },
              'Custom servers: ',
              customServers.map(url =>
                React.createElement('span', { key: url, className: 'custom-server-item' },
                  React.createElement('code', null, url),
                  React.createElement('button', {
                    className: 'remove',
                    onClick: () => handleRemoveServer(url),
                    title: 'Remove this server'
                  }, 'x')
                )
              )
            )
          );
        }
      }
    });

    function renderUsersLink() {
      const link = document.createElement('div');
      link.style.cssText = 'position:fixed;top:10px;right:10px;z-index:1000;background:#f5f5f5;padding:6px 10px;border-radius:6px;border:1px solid #ddd;font-family: sans-serif;';
      link.innerHTML = '<a href="docs/users">Users API Docs</a>';
      document.body.appendChild(link);
    }

    async function initSwaggerUI() {
      try {
        // Fetch the spec as JSON
        const response = await fetch('openapi.json');
        if (!response.ok) {
          throw new Error('Failed to fetch OpenAPI spec');
        }
        const spec = await response.json();

        // Get current origin (request URL) - strip /api/v1/admin/docs from the path
        // since the OpenAPI spec paths already include /api/v1/admin
        const basePath = window.location.pathname.replace(/\/api\/v1\/admin\/docs\/?$/, '');
        const currentOrigin = window.location.origin + basePath;

        // Get custom servers and selected server from localStorage
        const customServers = getCustomServers();
        const selectedServer = getSelectedServer();

        // Build the servers list
        const specServers = spec.servers || [];
        const allUrls = new Set();
        const mergedServers = [];

        // If there's a selected server, add it first (makes it the default)
        if (selectedServer && !allUrls.has(selectedServer)) {
          // Find if it has a description from spec or custom servers
          const specServer = specServers.find(s => s.url === selectedServer);
          const isCustom = customServers.includes(selectedServer);
          const description = specServer?.description || 
            (selectedServer === currentOrigin ? 'Current instance (auto-detected)' : 
             isCustom ? 'Custom server (user-added)' : 'Selected server');
          mergedServers.push({ url: selectedServer, description });
          allUrls.add(selectedServer);
          // Clear the selected server after using it (one-time selection)
          clearSelectedServer();
        }

        // Add current origin if not already added
        const currentInSpec = specServers.some(s => s.url === currentOrigin);
        if (!currentInSpec && !allUrls.has(currentOrigin)) {
          mergedServers.push({ url: currentOrigin, description: 'Current instance (auto-detected)' });
          allUrls.add(currentOrigin);
        }

        // Add spec servers
        for (const server of specServers) {
          if (!allUrls.has(server.url)) {
            mergedServers.push(server);
            allUrls.add(server.url);
          }
        }

        // Add custom servers from localStorage
        for (const url of customServers) {
          if (!allUrls.has(url)) {
            mergedServers.push({ url, description: 'Custom server (user-added)' });
            allUrls.add(url);
          }
        }

        spec.servers = mergedServers;

        // Initialize Swagger UI with the modified spec
        window.ui = SwaggerUIBundle({
          spec: spec,
          dom_id: '#swagger-ui',
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          plugins: [EditableServersPlugin(customServers)],
          layout: 'BaseLayout',
          deepLinking: true,
          filter: true,
        });
      } catch (error) {
        console.error('Failed to initialize Swagger UI:', error);
        // Fallback to basic initialization
        window.ui = SwaggerUIBundle({
          url: 'openapi.yaml',
          dom_id: '#swagger-ui',
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: 'BaseLayout',
          deepLinking: true,
          filter: true,
        });
      }
    }
  </script>
</head>
<body onload="renderUsersLink(); initSwaggerUI();">
  <div id="swagger-ui"></div>
</body>
</html>
