components:
  schemas:
    PublicKeyEntry:
      description: A public key entry managed by the API.
      type: object
      required:
        - kid
        - key
      properties:
        kid:
          type: string
          description: Key ID
        key:
          $ref: '#/components/schemas/Jwk'
        iat:
          type: number
          format: date-time
          nullable: true
          description: Time at which this key was issued.
          example: '1756449710'
        nbf:
          type: number
          format: date-time
          nullable: true
          description: Time from which the key is valid.
          example: '1756449710'
        exp:
          type: number
          format: date-time
          nullable: true
          description: Expiry time of the key.
          example: '1756536110'
        revoked_at:
          type: number
          format: date-time
          nullable: true
          description: Revocation time if revoked.
          example: '1756536110'
        reason:
          type: string
          description: Optional reason for revocation.
    AddPublicKeyEntry:
      description: Request to add a new public key.
      type: object
      required:
        - key
      properties:
        key:
          $ref: '#/components/schemas/Jwk'
        iat:
          type: number
          format: date-time
          nullable: true
          description: Time at which this key was issued.
          example: '1756449710'
        nbf:
          type: number
          format: date-time
          nullable: true
          example: '1756449710'
        exp:
          type: number
          format: date-time
          nullable: true
          example: '1756536110'
    # DeletePublicKeyRequest removed; route uses path and query parameters instead of a request body.
    UpdatePublicKeyMetadata:
      description: Editable metadata fields for a public key.
      type: object
      properties:
        nbf:
          type: number
          format: date-time
          nullable: true
          example: '1756449710'
        exp:
          type: number
          format: date-time
          nullable: true
          example: '1756536110'
    RotatePublicKeyRequest:
      description: Request body for rotating a public key.
      type: object
      required:
        - key
      properties:
        key:
          $ref: '#/components/schemas/Jwk'
        iat:
          type: number
          format: date-time
          nullable: true
          example: '1756449710'
        nbf:
          type: number
          format: date-time
          nullable: true
          example: '1756449710'
        exp:
          type: number
          format: date-time
          nullable: true
          example: '1756536110'
        old_key_exp:
          type: number
          format: date-time
          nullable: true
          example: '1756450010'
    AnyValue:
      description: Any JSON value. This intentionally permits any type.
      type: object
      additionalProperties: true
      example:
        Example: value
    ErrorResponse:
      title: Root Type for ErrorResponse
      description: Standard error response with code and description.
      required:
        - error
      type: object
      properties:
        error:
          type: string
        error_description:
          type: string
      example:
        error: not found
        error_description: resource not found
    EntityID:
      format: uri
      description: The Entity ID of the Entity.
      type: string
      example: https://entity.oidfed.org
    InternalID:
      oneOf:
        - type: string
        - type: integer
    AuthorityHint:
      description: The Entity ID of a superior
      required:
        - id
        - entity_id
      type: object
      properties:
        id:
          $ref: '#/components/schemas/InternalID'
          description: Internal identifier for this AuthorityHint.
        entity_id:
          $ref: '#/components/schemas/EntityID'
          description: The Entity ID of the superior.
        description:
          type: string
          description: Optional human-readable description for this AuthorityHint.
    AddAuthorityHint:
      title: Root Type for AddAuthorityHint
      description: Data to add an authority hint
      required:
        - entity_id
      type: object
      properties:
        entity_id:
          $ref: '#/components/schemas/EntityID'
        description:
          type: string
          description: Optional human-readable description for this AuthorityHint.
      example:
        entity_id: https://authority.example.com
    SignatureAlgorithm:
      description: The signature algorithm to use in JOSE/JWA format
      enum:
        - HS256
        - HS384
        - HS512
        - RS256
        - RS384
        - RS512
        - ES256
        - ES384
        - ES512
        - PS256
        - PS384
        - PS512
      type: string
      example: ES512
    
    KMSInfo:
      description: Information about the active KMS and current signing algorithm.
      type: object
      required:
        - kms
        - alg
        - rsa_key_len
      properties:
        kms:
          type: string
          description: Identifier or type of the active KMS.
          example: filesystem
        alg:
          $ref: '#/components/schemas/SignatureAlgorithm'
        pending_alg:
          $ref: '#/components/schemas/SignatureAlgorithm'
        alg_change_at:
          type: number
          format: date-time
          nullable: true
          example: '1756450010'
        rsa_key_len:
          type: integer
          description: Length of RSA keys in bits.
          example: 2048
        rotation:
          $ref: '#/components/schemas/KMSRotationOptions'
    
    KMSRotationOptions:
      description: Rotation options for the KMS-managed keys.
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether automatic rotation is enabled.
        interval:
          type: integer
          format: int64
          description: Rotation interval in seconds.
          example: 2592000
        overlap:
          type: integer
          format: int64
          description: Overlap window where old and new keys are both valid, in seconds.
          example: 604800
    
    Jwk:
      required:
        - kid
        - kty
      type: object
      properties:
        kty:
          description: The key type (e.g., EC).
          type: string
          example: EC
        crv:
          nullable: true
          description: The elliptic curve used (only for EC keys).
          type: string
          example: P-256
        kid:
          description: The key ID.
          type: string
          example: '12345'
        x:
          nullable: true
          description: The X coordinate for EC keys (optional).
          type: string
          example: o-7zraXKDaoBte2PsuTXo-MSLzsyWdAElNptGgI4aH8
        'y':
          nullable: true
          description: The Y coordinate for EC keys (optional).
          type: string
          example: Xr_wCzJ1XnsgAIV5qHruzSwaNnwy87UjmevVklTpIv8
        'n':
          nullable: true
          description: The modulus for RSA keys.
          type: string
          example: modulus_value
        e:
          nullable: true
          description: The exponent for RSA keys.
          type: string
          example: AQAB
        alg:
          nullable: true
          $ref: '#/components/schemas/SignatureAlgorithm'
          description: The algorithm associated with the key.
          example: ES256
        use:
          nullable: true
          description: The intended use of the key (e.g., sig, enc).
          type: string
          example: sig
        x5u:
          nullable: true
          format: uri
          description: A URL that points to an X.509 public key certificate or certificate chain.
          type: string
          example: https://example.com/cert.pem
        x5c:
          nullable: true
          description: The X.509 certificate chain.
          type: array
          items:
            description: A base64-encoded string representing an X.509 certificate.
            type: string
            example: MIICoTCCAYkCAQ...
        x5t:
          nullable: true
          description: The SHA-1 thumbprint of the X.509 certificate.
          type: string
          example: dGhpcyBpcyBqdXN0IGEgdGh1bWJwcmludA
        x5tS256:
          nullable: true
          description: The SHA-256 thumbprint of the X.509 certificate.
          type: string
          example: sM4KhEI1Y2Sb6-EVr6tJabmJuoP-ZE...
      example:
        alg: ES512
        crv: P-521
        kid: LxIDw8zAmgI2OjsXMS_QKyiPaR7GH1QVw3sIaUlWWy0
        kty: EC
        use: sig
        x: AJgCXH_ugrh2AgOgNaD2h4ho36fobGDvUn5BzWOGAEF--sfRW6bT5gHx_kNh6ajnVCbPdOn3kfx6fCX306MmfmNb
        'y': AON1eYFPmxeFkNYD04Ar6rToYruV8_btso-iXAkLRpOBrLeICdjxUuyPnFpOHmRbyoqih7tla2Nwo1dle8JJKEC8
    ManagedJWK:
      allOf:
        - $ref: '#/components/schemas/Jwk'
        - type: object
          properties:
            kms:
              description: The Key Management System
              type: string
              example: filesystem
            kms_key_ref:
              description: The KMS Key reference (the id of the key in the KMS) if supported
              type: string
              example: my-key
            iat:
              nullable: true
              description: The timestamp when the JWK was created.
              type: integer
              example: '1756449710'
            exp:
              description: The time when the key expires and will not be valid anymore.
              type: integer
              example: '1756536110'
    
    Revoked:
      title: Root Type for Revoked
      description: JSON object that contains the properties of the revocation
      required:
        - revoked_at
      type: object
      properties:
        revoked_at:
          description: Time when the key was revoked or must be considered revoked
          type: integer
          example: |
            123972495172
        reason:
          description: String that identifies the reason for the key revocation
          type: string
          example: compromised
      example:
        revoked_at: 123972495172
        reason: compromised
    
    EntityTypedMetadata:
      description: Metadata for one Entity Type
      type: object
      allOf:
        - type: object
        - $ref: '#/components/schemas/CommonMetadata'
    CommonMetadata:
      description: Metadata Claims that can be used with any Entity Type
      type: object
      properties:
        organization_name:
          description: >-
            A human-readable name representing the organization owning this Entity. If the owner
            is a physical person, this MAY be, for example, the person's name.
          type: string
        display_name:
          description: A human-readable name of the Entity to be presented to the End-User.
          type: string
        description:
          description: A human-readable brief description of this Entity presentable to the End-User.
          type: string
        keywords:
          description: >-
            JSON array with one or more strings representing search keywords, tags, categories, or
            labels that apply to this Entity.
          type: array
          items:
            type: string
        contacts:
          description: >-
            JSON array with one or more strings representing contact persons at the Entity. These
            MAY contain names, e-mail addresses, descriptions, phone numbers, etc.
          type: array
          items:
            type: string
        logo_uri:
          format: uri
          description: >-
            A URL that points to the logo of this Entity. The file containing the logo SHOULD be
            published in a format that can be viewed via the web.
          type: string
        policy_uri:
          format: uri
          description: URL of the documentation of conditions and policies relevant to this Entity.
          type: string
        information_uri:
          format: uri
          description: >-
            URL for documentation of additional information about this Entity viewable by the
            End-User.
          type: string
        organization_uri:
          format: uri
          description: URL of a Web page for the organization owning this Entity.
          type: string
    Metadata:
      description: ' JSON object that declares roles that the Entity plays - its Entity Types - and that contains metadata for those Entity Types. Each member name of the JSON object is an Entity Type Identifier, and each value MUST be a JSON object containing metadata parameters according to the metadata schema of the Entity Type.'
      type: object
      additionalProperties:
        $ref: '#/components/schemas/EntityTypedMetadata'
      example:
        federation_entity:
          organization_name: Example Organization
          display_name: Example Federation Entity
          contacts:
            - admin@example.org
        openid_provider:
          issuer: https://op.example.org
          authorization_endpoint: https://op.example.org/authorize
          token_endpoint: https://op.example.org/token
        relying_party:
          client_id: client123
          redirect_uris:
            - https://rp.example.org/callback
    MetadataPolicyOperatorName:
      description: The name of a metadata policy operator
      type: string
      example: subset_of
    MetadataPolicyEntry:
      title: Root Type for MetadataPolicyEntry
      description: >-
        An entry for a metadata policy for a single claim. Can have multiple policy operators (and
        values).
      type: object
      example:
        subset_of:
          - foo
          - bar
    EntityTypedMetadataPolicy:
      title: Root Type for EntityTypedMetadataPolicy
      description: >-
        A type for expressing metadata policies for a single entity type. Keys are claim names and
        values are MetadataPolicyEntry.
      type: object
      additionalProperties:
        $ref: '#/components/schemas/MetadataPolicyEntry'
      example:
        scope:
          superset_of:
            - openid
            - profile
            - email
    MetadataPolicy:
      description: >-
        A type for expressing metadata policies for an entity. Keys are entity types and values are
        EntityTypedMetadataPolicy.
      type: object
      additionalProperties:
        $ref: '#/components/schemas/EntityTypedMetadataPolicy'
      example:
        openid_provider:
          scope:
            superset_of:
              - openid
              - profile
              - email
    Jwks:
      required:
        - jwks
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/Jwk'
    Constraints:
      description: >-
        A set of constraints applied to subordinate entities. Additional parameters MAY be defined.
      type: object
      properties:
        max_path_length:
          description: >-
            Integer specifying the maximum number of Intermediate Entities between the Entity setting
            the constraint and the Trust Chain subject.
          type: integer
          minimum: 0
        naming_constraints:
          description: >-
            Restrictions on the URIs of the Entity Identifiers of Subordinate Entities.
          $ref: '#/components/schemas/NamingConstraints'
        allowed_entity_types:
          description: >-
            Entity Type Identifiers that Subordinate Entities are allowed to have.
          $ref: '#/components/schemas/AllowedEntityTypes'
      example:
        max_path_length: 2
        naming_constraints:
          permitted:
            - .example.com
          excluded:
            - east.example.com
        allowed_entity_types:
          - openid_provider
          - openid_relying_party
    NamingConstraints:
      description: >-
        Restrictions on the URIs of the Entity Identifiers of Subordinate Entities. Defined as
        permitted and excluded URI name subtrees.
      type: object
      properties:
        permitted:
          $ref: '#/components/schemas/NamingSubtrees'
        excluded:
          $ref: '#/components/schemas/NamingSubtrees'
    NamingSubtrees:
      description: A list of naming subtrees.
      type: array
      items:
        type: string
    NamingSubtree:
      description: A naming subtree entry.
      type: string
    AllowedEntityTypes:
      description: A list of allowed entity type identifiers.
      type: array
      items:
        $ref: '#/components/schemas/EntityTypeIdentifier'
    EntityTypeIdentifier:
      description: An entity type identifier.
      type: string
    LifetimeSeconds:
      description: Lifetime value in seconds.
      type: integer
      minimum: 0
      example: 86400
    AdditionalClaims:
      description: A list of AdditionalClaim.
      type: array
      items:
        $ref: '#/components/schemas/AdditionalClaim'
    AdditionalClaim:
      description: A single additional custom claim consisting of claim name, value, and crit flag.
      required:
        - id
        - claim
        - value
      type: object
      properties:
        id:
          $ref: '#/components/schemas/InternalID'
          description: Internal identifier for this additional claim row
        claim:
          type: string
          description: The claim name
        value:
          description: The claim value (arbitrary JSON)
        crit:
          type: boolean
          description: Whether the claim is critical
    AddAdditionalClaim:
      description: Fields that can be updated for an additional claim.
      type: object
      properties:
        claim:
          type: string
          description: The claim name
        value:
          description: The claim value (arbitrary JSON)
        crit:
          type: boolean
          description: Whether the claim is critical
    Subordinate:
      description: Information about a subordinate entity.
      required:
        - id
        - entity_id
        - status
      type: object
      properties:
        id:
          $ref: '#/components/schemas/InternalID'
          description: The internal identifier of the subordinate.
        entity_id:
          $ref: '#/components/schemas/EntityID'
          description: The Entity ID (identifier) of the subordinate.
        status:
          description: Current status of the subordinate.
          type: string
          example: active
        description:
          type: string
          description: Optional human-readable description for this Subordinate.
        registered_entity_types:
          description: Entity types the subordinate is registered for.
          type: array
          items:
            type: string
      example:
        entity_id: https://subordinate.example.com
        registered_entity_types:
          - openid_provider
          - openid_relying_party
    AddSubordinate:
      description: |
        Data to create a new subordinate entity.
        Note: Status "active" requires the subordinate to have at least one key in jwks.
        If no status is provided, defaults to "active" (requires jwks to be provided).
      required:
        - entity_id
      type: object
      properties:
        entity_id:
          $ref: '#/components/schemas/EntityID'
          description: The Entity ID (identifier) of the subordinate.
        status:
          description: |
            Initial status of the subordinate. Defaults to "active" if not provided.
            Note: "active" status requires jwks with at least one key.
          type: string
          enum:
            - active
            - blocked
            - pending
            - inactive
          default: active
        description:
          type: string
          description: Optional human-readable description for this Subordinate.
        registered_entity_types:
          description: Entity types the subordinate is registered for.
          type: array
          items:
            type: string
        jwks:
          $ref: '#/components/schemas/Jwks'
          description: JWKS for the subordinate. Required if status is "active".
      example:
        entity_id: https://subordinate.example.com
        status: pending
        description: My subordinate entity
        registered_entity_types:
          - openid_provider
    UpdateSubordinate:
      description: Data to update a subordinate entity.
      type: object
      properties:
        description:
          type: string
          description: Optional human-readable description for this Subordinate.
        registered_entity_types:
          description: Entity types the subordinate is registered for.
          type: array
          items:
            type: string
      example:
        description: Updated description
        registered_entity_types:
          - openid_provider
          - openid_relying_party
    SubordinateDetails:
      description: Subordinate entity including managed data from the subordinate API.
      required:
        - id
        - entity_id
        - status
        - jwks
      type: object
      properties:
        id:
          $ref: '#/components/schemas/InternalID'
          description: The internal identifier of the subordinate.
        entity_id:
          $ref: '#/components/schemas/EntityID'
          description: The Entity ID (identifier) of the subordinate.
        status:
          description: Current status of the subordinate.
          type: string
          example: active
        registered_entity_types:
          description: Entity types the subordinate is registered for.
          type: array
          items:
            type: string
        description:
          description: Optional human-readable description of the subordinate.
          type: string
        jwks:
          $ref: '#/components/schemas/Jwks'
          description: The subordinate's JWKS.
        metadata:
          $ref: '#/components/schemas/Metadata'
          description: Subordinate-specific metadata.
        metadata_policy:
          $ref: '#/components/schemas/MetadataPolicy'
          description: Subordinate-specific metadata policies.
        constraints:
          $ref: '#/components/schemas/Constraints'
          description: Subordinate-specific constraints.
        additional_claims:
          $ref: '#/components/schemas/AdditionalClaims'
          description: Subordinate-specific additional custom claims.
      example:
        id: id
        entity_id: https://subordinate.example.com
        status: active
        registered_entity_types:
          - openid_provider
        jwks:
          keys:
            - kty: EC
              crv: P-256
              kid: 'sub-12345'
              x: o-7zraXKDaoBte2PsuTXo-MSLzsyWdAElNptGgI4aH8
              y: Xr_wCzJ1XnsgAIV5qHruzSwaNnwy87UjmevVklTpIv8
              alg: ES256
        metadata:
          federation_entity:
            organization_name: Example
        metadata_policies:
          openid_provider:
            scope:
              superset_of:
                - openid
                - profile
                - email
        constraints:
          max_path_length: 2
        additional_claims:
          custom_claim: custom_value
    SubordinateHistory:
      description: History of events related to a subordinate with pagination information.
      type: object
      required:
        - events
        - pagination
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/SubordinateEvent'
        pagination:
          $ref: '#/components/schemas/Pagination'
    SubordinateEvent:
      description: A single event in subordinate history.
      type: object
      required:
        - timestamp
        - type
      properties:
        timestamp:
          type: integer
          description: Unix timestamp (seconds since epoch) when the event occurred.
        type:
          type: string
          description: The type/category of the event.
          enum:
            - created
            - deleted
            - status_updated
            - updated
            - jwk_added
            - jwk_removed
            - jwks_replaced
            - metadata_updated
            - metadata_deleted
            - policy_updated
            - policy_deleted
            - constraints_updated
            - constraints_deleted
            - claims_updated
            - claim_deleted
        status:
          type: string
          description: Subordinate status at the time of the event, if applicable.
          nullable: true
        message:
          type: string
          description: Optional descriptive message providing context for the event.
          nullable: true
        actor:
          type: string
          description: Optional identifier for the actor performing the event.
          nullable: true
    Pagination:
      description: Pagination information for list responses.
      type: object
      required:
        - total
        - limit
        - offset
      properties:
        total:
          type: integer
          description: Total number of items matching the query.
        limit:
          type: integer
          description: Maximum number of items returned per page.
        offset:
          type: integer
          description: Number of items skipped.
    TrustMarkOwner:
      description: Owner of a trust mark type.
      required:
        - entity_id
        - jwks
      type: object
      properties:
        entity_id:
          $ref: '#/components/schemas/EntityID'
          description: The Entity ID of the owner.
        jwks:
          $ref: '#/components/schemas/Jwks'
          description: The JWKS of the owner.
        description:
          type: string
          description: Optional human-readable description for this TrustMarkOwner.
      example:
        entity_id: https://owner.example.org
        jwks:
          keys:
            - kty: EC
              crv: P-256
              kid: 'owner-12345'
              x: o-7zraXKDaoBte2PsuTXo-MSLzsyWdAElNptGgI4aH8
              y: Xr_wCzJ1XnsgAIV5qHruzSwaNnwy87UjmevVklTpIv8
              alg: ES256
    AddTrustMarkOwner:
      description: Data to add or link a trust mark owner.
      oneOf:
        - type: object
          required:
            - owner_id
          properties:
            owner_id:
              $ref: '#/components/schemas/InternalID'
              description: Reference to an existing global owner (internal id).
          example:
            owner_id: 42
        - type: object
          required:
            - entity_id
            - jwks
          properties:
            entity_id:
              $ref: '#/components/schemas/EntityID'
              description: The Entity ID of the owner.
            jwks:
              $ref: '#/components/schemas/Jwks'
              description: The JWKS of the owner.
          example:
            entity_id: https://owner.example.org
            jwks:
              keys:
                - kty: EC
                  crv: P-256
                  kid: 'owner-12345'
                  x: o-7zraXKDaoBte2PsuTXo-MSLzsyWdAElNptGgI4aH8
                  y: Xr_wCzJ1XnsgAIV5qHruzSwaNnwy87UjmevVklTpIv8
                  alg: ES256
    AddTrustMarkOwnerCreate:
      description: Data to create a new trust mark owner.
      type: object
      required:
        - entity_id
        - jwks
      properties:
        entity_id:
          $ref: '#/components/schemas/EntityID'
          description: The Entity ID of the owner.
        jwks:
          $ref: '#/components/schemas/Jwks'
          description: The JWKS of the owner.
      example:
        entity_id: https://owner.example.org
        jwks:
          keys:
            - kty: EC
              crv: P-256
              kid: 'owner-12345'
              x: o-7zraXKDaoBte2PsuTXo-MSLzsyWdAElNptGgI4aH8
              y: Xr_wCzJ1XnsgAIV5qHruzSwaNnwy87UjmevVklTpIv8
              alg: ES256
    TrustMarkType:
      description: A trust mark type definition.
      required:
        - id
        - trust_mark_type
      type: object
      properties:
        id:
          $ref: '#/components/schemas/InternalID'
          description: Internal identifier for this TrustMarkType.
        trust_mark_type:
          type: string
          description: The trust mark type identifier.
        description:
          type: string
          description: Optional human-readable description for this TrustMarkType.
      example:
        id: id
        trust_mark_type: https://example.org/trust_mark_type
    AddTrustMarkType:
      description: Data to add a trust mark type.
      required:
        - trust_mark_type
      type: object
      properties:
        trust_mark_type:
          type: string
          description: The trust mark type identifier.
        trust_mark_issuers:
          description: Issuers authorized for this trust mark type.
          type: array
          items:
            $ref: '#/components/schemas/AddTrustMarkIssuer'
        trust_mark_owner:
          description: Optional owner to set for this trust mark type.
          $ref: '#/components/schemas/AddTrustMarkOwner'
    TrustMark:
      description: A trust mark entry in the entity configuration.
      required:
        - id
        - trust_mark_type
      type: object
      properties:
        id:
          $ref: '#/components/schemas/InternalID'
          description: Internal identifier for this trust mark.
        trust_mark_type:
          type: string
          description: The trust mark type identifier.
        trust_mark_issuer:
          type: string
          description: The issuer of the trust mark. Required when not using self-issuance.
        trust_mark:
          type: string
          description: The trust mark JWT. May be empty if refresh is enabled and trust mark has not yet been fetched.
        refresh:
          type: boolean
          description: Whether automatic refresh of this trust mark is enabled.
        min_lifetime:
          type: integer
          minimum: 0
          description: Minimum remaining lifetime (in seconds) before a refresh is triggered.
        refresh_grace_period:
          type: integer
          minimum: 0
          description: Grace period (in seconds) after expiration during which refresh is still attempted.
        refresh_rate_limit:
          type: integer
          minimum: 0
          description: Minimum time (in seconds) between refresh attempts.
        self_issuance_spec:
          $ref: '#/components/schemas/SelfIssuedTrustMarkSpec'
          description: Specification for self-issued trust marks. If set, the entity issues this trust mark to itself.
    AddTrustMark:
      description: >-
        Data to create a trust mark entry. Provide either:
        (1) `trust_mark_type` and `trust_mark_issuer` to configure external trust mark fetching,
        (2) `trust_mark` (JWT) directly, or
        (3) `self_issuance_spec` for self-issued trust marks.
        Self-issued trust marks always refresh automatically based on the configured lifetime.
      type: object
      properties:
        trust_mark_type:
          type: string
          description: The trust mark type identifier.
        trust_mark_issuer:
          type: string
          description: The issuer of the trust mark. Required when using external trust mark fetching.
        trust_mark:
          type: string
          description: The trust mark JWT. Provide this if you already have the JWT.
        refresh:
          type: boolean
          description: Whether automatic refresh of this trust mark is enabled.
          default: false
        min_lifetime:
          type: integer
          minimum: 0
          description: Minimum remaining lifetime (in seconds) before a refresh is triggered.
        refresh_grace_period:
          type: integer
          minimum: 0
          description: Grace period (in seconds) after expiration during which refresh is still attempted.
        refresh_rate_limit:
          type: integer
          minimum: 0
          description: Minimum time (in seconds) between refresh attempts.
        self_issuance_spec:
          $ref: '#/components/schemas/SelfIssuedTrustMarkSpec'
          description: Specification for self-issued trust marks. If set, the entity issues this trust mark to itself.
    UpdateTrustMark:
      description: Data to update a trust mark.
      type: object
      properties:
        trust_mark_issuer:
          type: string
          description: The issuer of the trust mark.
        trust_mark:
          type: string
          description: The trust mark JWT.
        refresh:
          type: boolean
          description: Whether automatic refresh of this trust mark is enabled.
        min_lifetime:
          type: integer
          minimum: 0
          description: Minimum remaining lifetime (in seconds) before a refresh is triggered.
        refresh_grace_period:
          type: integer
          minimum: 0
          description: Grace period (in seconds) after expiration during which refresh is still attempted.
        refresh_rate_limit:
          type: integer
          minimum: 0
          description: Minimum time (in seconds) between refresh attempts.
        self_issuance_spec:
          $ref: '#/components/schemas/SelfIssuedTrustMarkSpec'
          description: Specification for self-issued trust marks. If set, the entity issues this trust mark to itself.
    SelfIssuedTrustMarkSpec:
      description: >-
        Specification for a self-issued trust mark. Used when the entity issues trust marks to itself.
        Self-issued trust marks always refresh automatically based on the configured lifetime.
      type: object
      properties:
        lifetime:
          type: integer
          minimum: 0
          description: Lifetime of the self-issued trust mark, in seconds.
          example: 86400
        ref:
          type: string
          format: uri
          description: URL reference with details about the trust mark type.
          example: https://example.org/specs/trust-marks/self-certified
        logo_uri:
          type: string
          format: uri
          description: URL to the logo associated with this trust mark type.
          example: https://example.org/assets/self-certified-logo.png
        additional_claims:
          type: object
          additionalProperties: true
          description: Additional custom claims (key-value pairs) to include in the self-issued trust mark.
          example:
            organization_name: Example Organization
            certification_level: gold
        include_extra_claims_in_info:
          type: boolean
          description: Whether to include additional claims in the trust mark info endpoint response.
          default: false
    TrustMarkSpec:
      description: Specification describing a trust mark type that can be issued.
      type: object
      required:
        - id
        - trust_mark_type
      properties:
        id:
          $ref: '#/components/schemas/InternalID'
          description: Internal identifier for this TrustMarkSpec.
          readOnly: true
        trust_mark_type:
          type: string
          description: The trust mark type identifier.
          example: https://example.org/trust-marks/foobar
        description:
          type: string
          description: Optional human-readable description for this TrustMarkSpec.
        lifetime:
          type: integer
          minimum: 0
          description: Lifetime of the trust mark, in seconds.
          example: 86400
        ref:
          type: string
          format: uri
          description: URL reference with details about the trust mark type.
          example: https://example.org/specs/trust-marks/foobar
        logo_uri:
          type: string
          format: uri
          description: URL to the logo associated with this trust mark type.
          example: https://example.org/assets/foobar-logo.png
        delegation_jwt:
          type: string
          description: The delegation JWT issued by the trust mark owner if this trust mark uses delegation.
        additional_claims:
          type: object
          additionalProperties: true
          description: |
            General additional claims (simple key-value map) included in all trust marks of this type.
            Example: {"org_name": "Federation", "level": "standard"}
        eligibility_config:
          $ref: '#/components/schemas/EligibilityConfig'
          description: Configuration for determining trust mark eligibility.
        cache_ttl:
          type: integer
          minimum: 0
          default: 0
          description: |
            How long to cache issued trust marks for this type, in seconds.
            When a trust mark is requested, if a cached version exists and has not expired,
            it will be returned instead of issuing a new one. This reduces signing operations
            and database writes for repeated requests.
            
            The actual cache duration is the minimum of this value and the time until the
            trust mark expires (based on the `lifetime` field).
            
            Set to 0 (default) to disable caching - a new trust mark JWT will be issued
            and persisted for each request.
          example: 300
    AddTrustMarkSpec:
      description: Data to create or update a TrustMarkSpec.
      type: object
      required:
        - trust_mark_type
      properties:
        trust_mark_type:
          type: string
          description: The trust mark type identifier.
          example: https://example.org/trust-marks/foobar
        description:
          type: string
          description: Optional human-readable description for this TrustMarkSpec.
        lifetime:
          type: integer
          minimum: 0
          description: Lifetime of the trust mark, in seconds.
          example: 86400
        ref:
          type: string
          format: uri
          description: URL reference with details about the trust mark type.
          example: https://example.org/specs/trust-marks/foobar
        logo_uri:
          type: string
          format: uri
          description: URL to the logo associated with this trust mark type.
          example: https://example.org/assets/foobar-logo.png
        delegation_jwt:
          type: string
          description: The delegation JWT issued by the trust mark owner if this trust mark uses delegation.
        additional_claims:
          type: object
          additionalProperties: true
          description: General additional claims (simple key-value map).
        eligibility_config:
          $ref: '#/components/schemas/EligibilityConfig'
          description: Configuration for determining trust mark eligibility.
        cache_ttl:
          type: integer
          minimum: 0
          default: 0
          description: |
            How long to cache issued trust marks for this type, in seconds.
            Set to 0 (default) to disable caching.
          example: 300
    PatchTrustMarkSpec:
      description: Partial fields to update on a TrustMarkSpec.
      type: object
      properties:
        trust_mark_type:
          type: string
          description: The trust mark type identifier.
          example: https://example.org/trust-marks/foobar
        description:
          type: string
          description: Optional human-readable description for this TrustMarkSpec.
        lifetime:
          type: integer
          minimum: 0
          description: Lifetime of the trust mark, in seconds.
          example: 86400
        ref:
          type: string
          format: uri
          description: URL reference with details about the trust mark type.
          example: https://example.org/specs/trust-marks/foobar
        logo_uri:
          type: string
          format: uri
          description: URL to the logo associated with this trust mark type.
          example: https://example.org/assets/foobar-logo.png
        delegation_jwt:
          type: string
          description: The delegation JWT issued by the trust mark owner if this trust mark uses delegation.
        additional_claims:
          type: object
          additionalProperties: true
          description: General additional claims (simple key-value map).
        eligibility_config:
          $ref: '#/components/schemas/EligibilityConfig'
          description: Configuration for determining trust mark eligibility.
        cache_ttl:
          type: integer
          minimum: 0
          description: |
            How long to cache issued trust marks for this type, in seconds.
            Set to 0 to disable caching.
          example: 300
    TrustMarkSubject:
      description: Subject eligible for a specific trust mark issuance.
      type: object
      required:
        - id
        - entity_id
        - status
      properties:
        id:
          $ref: '#/components/schemas/InternalID'
          description: Internal identifier for this TrustMarkSubject.
          readOnly: true
        entity_id:
          $ref: '#/components/schemas/EntityID'
          description: The Entity ID (identifier) of the subject.
        status:
          type: string
          description: Current status of the subject.
          example: active
        description:
          type: string
          description: Optional human-readable description for this TrustMarkSubject.
        additional_claims:
          type: object
          additionalProperties: true
          description: |
            Per-subject additional claims (simple key-value map) that override general claims.
            Example: {"level": "premium"} would override a general {"level": "standard"}
    AddTrustMarkSubject:
      description: Data to create or update a TrustMarkSubject.
      type: object
      required:
        - entity_id
        - status
      properties:
        entity_id:
          $ref: '#/components/schemas/EntityID'
          description: The Entity ID (identifier) of the subject.
        status:
          type: string
          description: Current status of the subject.
          example: active
        description:
          type: string
          description: Optional human-readable description for this TrustMarkSubject.
        additional_claims:
          type: object
          additionalProperties: true
          description: Per-subject additional claims that override general claims.

    TrustMarkIssuer:
      description: A trust mark issuer object.
      required:
        - id
        - issuer
      type: object
      properties:
        id:
          $ref: '#/components/schemas/InternalID'
          description: Internal identifier for this issuer record.
        issuer:
          type: string
          description: The issuer identifier (Entity ID).
        description:
          type: string
          description: Optional human-readable description for this issuer.
      example:
        id: 1
        issuer: https://issuer.example.org
        description: Example issuer
    AddTrustMarkIssuer:
      description: Data to add or link a trust mark issuer.
      oneOf:
        - type: object
          required:
            - issuer_id
          properties:
            issuer_id:
              $ref: '#/components/schemas/InternalID'
              description: Reference to an existing global issuer (internal id).
        - type: object
          required:
            - issuer
          properties:
            issuer:
              type: string
              description: The issuer identifier (Entity ID).
            description:
              type: string
              description: Optional human-readable description for this issuer.

    AddTrustMarkIssuerCreate:
      description: Data to create a new trust mark issuer.
      type: object
      required:
        - issuer
      properties:
        issuer:
          type: string
          description: The issuer identifier (Entity ID).
        description:
          type: string
          description: Optional human-readable description for this issuer.
      example:
        issuer: https://issuer.example.org
        description: Trusted Issuer Inc.

    EligibilityConfig:
      description: |
        Configuration for determining trust mark eligibility.
        Defines how dynamic entity checks are combined with the database subject list.
      type: object
      properties:
        mode:
          type: string
          enum:
            - db_only
            - check_only
            - db_or_check
            - db_and_check
            - custom
          default: db_only
          description: |
            How eligibility is determined:
            - db_only: Only subjects in TrustMarkSubject DB with active status (default)
            - check_only: Only run entity checker, ignore DB
            - db_or_check: DB active status OR checker passes
            - db_and_check: DB active status AND checker passes
            - custom: Fully custom checker composition (db_list can be a sub-checker)
        checker:
          $ref: '#/components/schemas/EntityCheckerConfig'
          description: Entity checker configuration (used based on mode).
        check_cache_ttl:
          type: integer
          minimum: 0
          default: 10
          description: |
            Seconds to cache eligibility check results for unknown subjects.
            0 = no caching. Default: 10 seconds.
      example:
        mode: db_or_check
        checker:
          type: trust_path
          config:
            trust_anchors:
              - entity_id: https://trust-anchor.example.org
        check_cache_ttl: 30

    EntityCheckerConfig:
      description: |
        Configuration for an entity checker that validates entities for trust mark eligibility.
      type: object
      required:
        - type
      properties:
        type:
          type: string
          description: |
            Checker type. Built-in types:
            - none: always passes
            - db_list: checks TrustMarkSubject table for active status
            - trust_mark: entity must have specific trust mark
            - trust_path: entity must have valid trust path to trust anchors
            - authority_hints: entity must have specific authority hints
            - entity_id: entity ID must be in allowed list
            - http_list: fetch entity list from HTTP endpoint (JSON array)
            - http_list_jwt: fetch signed JWT entity list from HTTP endpoint
            - multiple_and: all sub-checkers must pass
            - multiple_or: any sub-checker passes
        config:
          type: object
          additionalProperties: true
          description: |
            Type-specific configuration. Examples:
            - trust_path: {"trust_anchors": [{"entity_id": "https://ta.example.org"}]}
            - entity_id: {"entity_ids": ["https://entity1.example.org", "https://entity2.example.org"]}
            - http_list: {"url": "https://api.example.org/entities", "cache_ttl": 300}
            - http_list_jwt: {"url": "...", "verification": {"mode": "trust_anchor", "trust_anchors": [...]}}
            - multiple_and/multiple_or: array of EntityCheckerConfig objects
      examples:
        trust_path:
          summary: Trust path checker
          value:
            type: trust_path
            config:
              trust_anchors:
                - entity_id: https://trust-anchor.example.org
        entity_id_list:
          summary: Entity ID allowlist
          value:
            type: entity_id
            config:
              entity_ids:
                - https://allowed1.example.org
                - https://allowed2.example.org
        http_list:
          summary: HTTP entity list
          value:
            type: http_list
            config:
              url: https://registry.example.org/api/entities
              cache_ttl: 300
        http_list_jwt:
          summary: HTTP JWT entity list with federation verification
          value:
            type: http_list_jwt
            config:
              url: https://registry.example.org/api/entities-signed
              list_claim: entities
              verification:
                mode: trust_anchor
                trust_anchors:
                  - entity_id: https://trust-anchor.example.org
        combined:
          summary: Combined checkers (OR logic)
          value:
            type: multiple_or
            config:
              - type: db_list
              - type: trust_path
                config:
                  trust_anchors:
                    - entity_id: https://trust-anchor.example.org

  responses:
    BadRequestError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing parameter:
              value:
                error: invalid_request
                error_description: parameter 'foobar' is missing
      description: Invalid request parameters
    UnauthorizedError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Authentication information is missing or invalid
    ForbiddenError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: The user does not have permission to perform the requested operation
    ServerError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            server error:
              value:
                error: server_error
                error_description: foobar
      description: Internal server error
    NotFoundError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            not found:
              value:
                error: not_found
                error_description: foobar was not found
      description: The requested resource was not found
    ConflictError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            conflict:
